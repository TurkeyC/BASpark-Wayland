name: 🔴 Bug Report (English)
description: Submit a bug report for the BASpark desktop client
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: checkboxes
    id: check-list         
    attributes:
      label: "Pre-flight Checklist"
      description: "Please check the following items before submitting your issue"
      options:
        - label: "I have confirmed that this is a bug within BASpark, not an issue with my OS or unrelated software."
        - label: "I am using the latest version of BASpark."
        - label: "I have provided sufficient information to reproduce the issue."

  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! To help us locate and fix the issue faster, please provide your environment and system details below.

  - type: input
    id: app-version         
    attributes:
      label: "BASpark Version"
      description: "Please provide the version number of BASpark you are using"
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os-version
    attributes:
      label: "Operating System"
      description: "The OS environment where you are running BASpark"
      options:
        - "Windows 11"
        - "Windows 10"
        - "Windows 7/8 (Not recommended)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: describe-bug        
    attributes:
      label: "Bug Description"
      description: "Please describe the bug symptoms in as much detail as possible."
      placeholder: "e.g., When clicking rapidly, the particle effects freeze or lag..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps 
    attributes:
      label: "Steps to Reproduce"
      description: "Provide clear, step-by-step instructions on how to reproduce the bug."
      placeholder: |
        1. Run BASpark
        2. Open the control panel and enable XXX feature
        3. Double-click anywhere on the desktop
        4. Observe the XXX error
    validations:
      required: false

  - type: textarea
    id: expected-actual
    attributes:
      label: "Expected & Actual Behavior"
      description: "What did you expect to happen, and what actually happened instead?"
      placeholder: |
        Expected: Blue particles should appear upon clicking.
        Actual: Nothing happens when clicking, and CPU usage spikes.
    validations:
      required: true

  - type: textarea
    id: screenshots         
    attributes:
      label: "Screenshots or Video (Optional)"
      description: "Drag and drop your images or screen recordings here."
    validations:
      required: false

  - type: textarea
    id: extra-info
    attributes:
      label: "Additional Information"
      description: "Any other relevant context, such as your GPU model, display scaling (DPI) settings, etc."
      placeholder: |
        GPU: RTX 3060
        Display Scaling: 125%